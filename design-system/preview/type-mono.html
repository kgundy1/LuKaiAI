<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mono — DM Mono</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<div style="display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:#00c8f0;text-transform:uppercase">— The origin</span>
    <span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:#7a8299">eyebrow · 10px · cyan</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:#131620;border-radius:10px;border:1px solid rgba(255,255,255,0.07)">
    <span style="font-family:var(--serif);font-size:22px"><span style="color:#c9a84c">Lu</span><span style="color:#e8eaf2">Kai</span><span style="font-family:var(--mono);font-size:11px;color:#00c8f0;letter-spacing:0.05em;margin-left:2px;vertical-align:super">AI</span></span>
    <span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:#7a8299">wordmark · AI superscript · 11px</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;padding:14px 18px;background:#131620;border-radius:10px;border:1px solid rgba(255,255,255,0.07)">
    <span style="font-family:var(--mono);font-size:22px;color:#34d399">$286,250</span>
    <span style="font-family:var(--mono);font-size:14px;color:#f87171">$20/mo</span>
    <span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:#7a8299">receipt figures · 14–22px</span>
  </div>
</div></div></body></html>
