<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<div style="display:flex;flex-direction:column;gap:10px">
  
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:4px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">4px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-1</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">tight gaps</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:8px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">8px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-2</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">icon-text</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:12px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">12px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-3</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">chip gaps</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:16px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">16px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-4</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">default flex gap</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:20px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">20px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-5</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">small block</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:24px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">24px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-6</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">card padding</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:32px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">32px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-8</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">section internal</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:48px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">48px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-12</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">column padding</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:80px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">80px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-20</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">section vertical mobile</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:120px;height:14px;background:linear-gradient(90deg,#00c8f0,#8b5cf6);border-radius:3px;flex-shrink:0"></div>
      <div style="font-family:var(--mono);font-size:11px;color:#e8eaf2;width:40px">120px</div>
      <div style="font-family:var(--mono);font-size:11px;color:#7a8299;width:48px">s-30</div>
      <div style="font-family:var(--sans);font-size:12px;color:#7a8299">section vertical desktop</div>
    </div>
</div></div></body></html>
