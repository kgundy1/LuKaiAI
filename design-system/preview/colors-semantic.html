<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<div class="swatch-row">
  <div class="swatch">
    <div class="chip" style="background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.15);position:relative;display:flex;align-items:center;justify-content:center">
      <span style="font-family:var(--mono);color:#34d399;font-size:16px">$20/mo</span>
    </div>
    <div class="name" style="color:#34d399">green</div>
    <div class="hex">#34d399 · affirmations</div>
    <div class="role">&ldquo;Actual cost,&rdquo; success states, in-celebration.</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.18);display:flex;align-items:center;justify-content:center">
      <span style="font-family:var(--mono);color:#f87171;font-size:16px">$286,250</span>
    </div>
    <div class="name" style="color:#f87171">red</div>
    <div class="hex">#f87171 · the cost of waiting</div>
    <div class="role">Used only for the traditional-build receipt total. Not for errors.</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:rgba(139,92,246,0.06);border:1px solid rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center">
      <span style="font-family:var(--serif);font-style:italic;color:#8b5cf6;font-size:20px">violet</span>
    </div>
    <div class="name" style="color:#8b5cf6">violet</div>
    <div class="hex">#8b5cf6 · gradient partner</div>
    <div class="role">Only as the second stop of cyan→violet. Never solo UI.</div>
  </div>
</div></div></body></html>
