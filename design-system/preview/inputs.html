<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<div style="display:flex;flex-direction:column;gap:18px">
  <form style="display:flex;border-radius:11px;overflow:hidden;border:1px solid rgba(255,255,255,0.12);background:#131620;max-width:460px" onsubmit="return false">
    <input placeholder="your@email.com" style="flex:1;background:transparent;border:none;outline:none;padding:15px 20px;font-family:var(--sans);font-size:15px;color:#e8eaf2"/>
    <button style="background:#00c8f0;color:#06070a;border:none;padding:15px 22px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.02em">I'm ready →</button>
  </form>
  <form style="display:flex;border-radius:11px;overflow:hidden;border:1px solid rgba(0,200,240,0.35);background:#131620;max-width:460px;box-shadow:0 0 0 3px rgba(0,200,240,0.07)" onsubmit="return false">
    <input value="kev@example.com" style="flex:1;background:transparent;border:none;outline:none;padding:15px 20px;font-family:var(--sans);font-size:15px;color:#e8eaf2"/>
    <button style="background:#00c8f0;color:#06070a;border:none;padding:15px 22px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.02em">I'm ready →</button>
  </form>
  <div style="max-width:460px">
    <label style="display:block;font-family:var(--mono);font-size:11px;color:#7a8299;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px">Password</label>
    <input type="password" value="••••••••••" style="width:100%;background:#131620;border:1px solid rgba(255,255,255,0.10);border-radius:9px;padding:13px 16px;font-family:var(--sans);font-size:15px;color:#e8eaf2;outline:none;box-sizing:border-box"/>
  </div>
</div></div></body></html>
