<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<div style="display:flex;flex-direction:column;gap:18px;align-items:flex-start">
  <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <a href="#" style="display:inline-flex;align-items:center;gap:8px;background:#00c8f0;color:#06070a;padding:13px 26px;border-radius:9px;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:.01em;font-family:var(--sans)">I want to know how →</a>
    <a href="#" style="font-size:14px;font-weight:500;color:#7a8299;text-decoration:none;font-family:var(--sans)">The full story ↓</a>
  </div>
  <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <a href="#" style="display:inline-flex;align-items:center;gap:8px;background:#22d3f0;color:#06070a;padding:13px 26px;border-radius:9px;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:.01em;font-family:var(--sans);box-shadow:0 10px 32px rgba(0,200,240,0.28);transform:translateY(-2px)">I'm ready →</a>
    <span style="font-family:var(--mono);font-size:10px;color:#7a8299;letter-spacing:0.12em;text-transform:uppercase">:HOVER · lift −2px · glow</span>
  </div>
  <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <button style="background:#00c8f0;color:#06070a;border:none;padding:13px 26px;border-radius:9px;font-size:15px;font-weight:700;font-family:var(--sans);opacity:0.5;cursor:default">Sending…</button>
    <button style="background:#34d399;color:#06070a;border:none;padding:13px 26px;border-radius:9px;font-size:15px;font-weight:700;font-family:var(--sans)">You're in ✓</button>
  </div>
</div></div></body></html>
