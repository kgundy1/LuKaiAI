<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Motion</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<style>
.bdot{width:8px;height:8px;border-radius:50%;background:#00c8f0;box-shadow:0 0 8px rgba(0,200,240,0.7);animation:bp 2.4s ease-in-out infinite}
@keyframes bp{0%,100%{opacity:1}50%{opacity:.4}}
.orb{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,0.5) 0%,transparent 65%);filter:blur(2px);animation:drift 4s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-12px)}}
.fade{animation:fadeUp 1.4s ease-in-out infinite}
@keyframes fadeUp{0%{opacity:0;transform:translateY(18px)}30%,70%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(18px)}}
</style>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px">
  <div style="background:#131620;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:flex-start;gap:14px;min-height:130px">
    <div style="display:flex;align-items:center;gap:10px;border:1px solid rgba(0,200,240,0.25);background:rgba(0,200,240,0.05);border-radius:100px;padding:5px 14px">
      <div class="bdot"></div>
      <span style="font-family:var(--mono);font-size:11px;color:#00c8f0;letter-spacing:0.1em">LIVE BUILD</span>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:#7a8299;letter-spacing:0.14em;text-transform:uppercase">PULSE · 2.4s ease-in-out</div>
  </div>
  <div style="background:#131620;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:flex-start;gap:14px;min-height:130px">
    <div class="orb"></div>
    <div style="font-family:var(--mono);font-size:10px;color:#7a8299;letter-spacing:0.14em;text-transform:uppercase">ORB DRIFT · 14s</div>
  </div>
  <div style="background:#131620;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:flex-start;gap:14px;min-height:130px">
    <span class="fade" style="font-family:var(--serif);font-size:26px;color:#e8eaf2">fade up</span>
    <div style="font-family:var(--mono);font-size:10px;color:#7a8299;letter-spacing:0.14em;text-transform:uppercase">FADE-UP · 0.6–0.8s · ease</div>
  </div>
</div></div></body></html>
