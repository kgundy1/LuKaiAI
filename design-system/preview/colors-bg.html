<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Background ladder</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<div class="swatch-row">
  <div class="swatch"><div class="chip" style="background:#06070a"></div><div class="name">void</div><div class="hex">#06070a</div><div class="role">Page bg</div></div>
  <div class="swatch"><div class="chip" style="background:#090b10"></div><div class="name">deep</div><div class="hex">#090b10</div><div class="role">Alt panels</div></div>
  <div class="swatch"><div class="chip" style="background:#0e1118"></div><div class="name">surface</div><div class="hex">#0e1118</div><div class="role">Section bands</div></div>
  <div class="swatch"><div class="chip" style="background:#131620"></div><div class="name">card</div><div class="hex">#131620</div><div class="role">Primary card</div></div>
  <div class="swatch"><div class="chip" style="background:#181c28"></div><div class="name">card2</div><div class="hex">#181c28</div><div class="role">Nested · hover</div></div>
</div>
<div style="margin-top:18px;display:flex;gap:12px;align-items:center">
  <div style="height:48px;flex:1;background:rgba(255,255,255,0.07);border-radius:6px;display:flex;align-items:center;padding:0 14px;font-family:var(--mono);font-size:11px;color:var(--ts)">border&nbsp;&nbsp;rgba(255,255,255,0.07)</div>
  <div style="height:48px;flex:1;background:rgba(255,255,255,0.12);border-radius:6px;display:flex;align-items:center;padding:0 14px;font-family:var(--mono);font-size:11px;color:var(--ts)">border2&nbsp;&nbsp;rgba(255,255,255,0.12)</div>
  <div style="height:48px;flex:1;background:rgba(255,255,255,0.18);border-radius:6px;display:flex;align-items:center;padding:0 14px;font-family:var(--mono);font-size:11px;color:var(--ts)">border3&nbsp;&nbsp;rgba(255,255,255,0.18)</div>
</div>
</div></body></html>
