<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Badges & tags</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<div style="display:flex;flex-direction:column;gap:14px;align-items:flex-start">
  <div style="display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(0,200,240,0.2);background:rgba(0,200,240,0.05);border-radius:100px;padding:5px 14px;font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:#00c8f0">
    <span style="width:6px;height:6px;border-radius:50%;background:#00c8f0;box-shadow:0 0 6px #00c8f0"></span>
    Live build · Real workflow
  </div>
  <div style="display:inline-flex;font-family:var(--mono);font-size:10px;color:#34d399;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);padding:3px 8px;border-radius:4px">ACTUAL: $20/mo</div>
  <div style="display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.07);color:#7a8299">Sounds familiar</div>
  <div style="display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid rgba(0,200,240,0.25);background:rgba(0,200,240,0.05);color:#00c8f0">The answer exists</div>
  <div style="display:inline-flex;align-items:center;gap:10px;font-size:14px;color:#b0b8d0;font-family:var(--sans)">
    <span style="width:18px;height:18px;border-radius:50%;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#34d399">✓</span>
    Production software — not a prototype.
  </div>
</div></div></body></html>
