<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Text hierarchy</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card-wrap">
<div style="display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;align-items:baseline;gap:18px">
    <div style="width:24px;height:24px;border-radius:6px;background:#e8eaf2;flex-shrink:0"></div>
    <div style="color:#e8eaf2;font-size:18px;font-weight:500">tp &nbsp;Primary text</div>
    <div style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--tt)">#e8eaf2 &middot; headings &amp; key text</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:18px">
    <div style="width:24px;height:24px;border-radius:6px;background:#b0b8d0;flex-shrink:0"></div>
    <div style="color:#b0b8d0;font-size:16px">ts &nbsp;Secondary body copy</div>
    <div style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--tt)">#b0b8d0</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:18px">
    <div style="width:24px;height:24px;border-radius:6px;background:#7a8299;flex-shrink:0"></div>
    <div style="color:#7a8299;font-size:14px">tt &nbsp;Tertiary — labels &amp; captions</div>
    <div style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--tt)">#7a8299</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:18px">
    <div style="width:24px;height:24px;border-radius:6px;background:#444c65;flex-shrink:0"></div>
    <div style="color:#444c65;font-size:13px">td &nbsp;Dim — placeholders &amp; copyright</div>
    <div style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--tt)">#444c65</div>
  </div>
</div></div></body></html>
