services:
  - type: web
    name: lukaiai-api
    runtime: docker
    repo: https://github.com/kgundy1/LukaiAI
    branch: main
    dockerfilePath: ./apps/api/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lukaiai-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://lukaiai.pages.dev

databases:
  - name: lukaiai-db
    plan: free
